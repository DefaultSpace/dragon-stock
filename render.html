<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SVG to PNG Renderer</title>
</head>
<body>
  <h2>SVG to PNG Renderer</h2>
  <img id="svgImg" src="icons/system-icon.svg" style="display:none;" />
  <div>
    <h3>512x512 Canvas</h3>
    <canvas id="canvas512" width="512" height="512" style="border:1px solid #ccc;"></canvas>
    <textarea id="base64_512" style="width:100%; height:80px;"></textarea>
  </div>
  <div>
    <h3>192x192 Canvas</h3>
    <canvas id="canvas192" width="192" height="192" style="border:1px solid #ccc;"></canvas>
    <textarea id="base64_192" style="width:100%; height:80px;"></textarea>
  </div>

  <script>
    window.addEventListener('load', () => {
      const img = document.getElementById('svgImg');
      
      // Wait for image loading
      const render = () => {
        try {
          const c512 = document.getElementById('canvas512');
          const ctx512 = c512.getContext('2d');
          ctx512.clearRect(0, 0, 512, 512);
          ctx512.drawImage(img, 0, 0, 512, 512);
          document.getElementById('base64_512').value = c512.toDataURL('image/png').split(',')[1];

          const c192 = document.getElementById('canvas192');
          const ctx192 = c192.getContext('2d');
          ctx192.clearRect(0, 0, 192, 192);
          ctx192.drawImage(img, 0, 0, 192, 192);
          document.getElementById('base64_192').value = c192.toDataURL('image/png').split(',')[1];
          
          console.log("Rendering complete!");
          document.body.setAttribute('data-status', 'ready');
        } catch (e) {
          console.error("Error drawing image to canvas:", e);
          document.body.setAttribute('data-status', 'error');
        }
      };

      if (img.complete) {
        render();
      } else {
        img.addEventListener('load', render);
        img.addEventListener('error', (e) => {
          console.error("Error loading SVG image:", e);
          document.body.setAttribute('data-status', 'error');
        });
      }
    });
  </script>
</body>
</html>
